server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/showhub_catalog
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
